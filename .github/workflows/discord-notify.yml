name: Discord GitHub Updates

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, closed]
  issues:
    types: [opened, reopened, closed]
  release:
    types: [published]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Post GitHub event to Discord
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;
            if (!webhookUrl) {
              core.setFailed("Missing DISCORD_WEBHOOK_URL secret");
              return;
            }

            const event = context.eventName;
            const payload = context.payload;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            let content = null;

            if (event === "pull_request") {
              const pr = payload.pull_request;
              if (payload.action === "opened") {
                content = [
                  `🔀 **PR opened** in \`${repo}\``,
                  `#${pr.number} ${pr.title}`,
                  pr.html_url
                ].join("\n");
              } else if (payload.action === "reopened") {
                content = [
                  `🔄 **PR reopened** in \`${repo}\``,
                  `#${pr.number} ${pr.title}`,
                  pr.html_url
                ].join("\n");
              } else if (payload.action === "closed" && pr.merged) {
                content = [
                  `✅ **PR merged** in \`${repo}\``,
                  `#${pr.number} ${pr.title}`,
                  pr.html_url
                ].join("\n");
              } else if (payload.action === "closed" && !pr.merged) {
                content = [
                  `❌ **PR closed** in \`${repo}\``,
                  `#${pr.number} ${pr.title}`,
                  pr.html_url
                ].join("\n");
              }
            }

            if (event === "issues") {
              const issue = payload.issue;
              if (payload.action === "opened") {
                content = [
                  `📌 **Issue opened** in \`${repo}\``,
                  `#${issue.number} ${issue.title}`,
                  issue.html_url
                ].join("\n");
              } else if (payload.action === "reopened") {
                content = [
                  `📂 **Issue reopened** in \`${repo}\``,
                  `#${issue.number} ${issue.title}`,
                  issue.html_url
                ].join("\n");
              } else if (payload.action === "closed") {
                content = [
                  `🗂️ **Issue closed** in \`${repo}\``,
                  `#${issue.number} ${issue.title}`,
                  issue.html_url
                ].join("\n");
              }
            }

            if (event === "release") {
              const release = payload.release;
              if (payload.action === "published") {
                content = [
                  `🚀 **Release published** in \`${repo}\``,
                  `${release.name || release.tag_name}`,
                  release.html_url
                ].join("\n");
              }
            }

            if (event === "workflow_run") {
              const run = payload.workflow_run;
              if (run.conclusion === "failure") {
                content = [
                  `🚨 **CI failed** in \`${repo}\``,
                  `${run.name} on branch \`${run.head_branch}\``,
                  run.html_url
                ].join("\n");
              } else if (run.conclusion === "success") {
                // Skip successful CI runs to reduce noise
                content = null;
              }
            }

            if (!content) {
              core.info("No Discord message needed for this event.");
              return;
            }

            const response = await fetch(webhookUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ content })
            });

            if (!response.ok) {
              const text = await response.text();
              core.setFailed(`Discord webhook failed: ${response.status} ${text}`);
              return;
            }

            core.info("Discord notification sent successfully.");
