<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" rx="40" fill="#FBF8F2"/>
  <text x="90" y="110" fill="#0F2743" font-size="42" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="800">TravelSync AI 代表性使用情境</text>
  <text x="90" y="150" fill="#40617F" font-size="24" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">以規劃、出發前、旅途中三個情境說明產品價值鏈</text>

  <rect x="90" y="220" width="430" height="560" rx="32" fill="#ECFFF6" stroke="#00A86B" stroke-width="2"/>
  <text x="130" y="285" fill="#00A86B" font-size="20" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="700">情境一</text>
  <text x="130" y="338" fill="#0F2743" font-size="34" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="800">開始規劃團體旅行</text>
  <text x="130" y="390" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">/start 建立旅程</text>
  <text x="130" y="424" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">/share 收集連結與想法</text>
  <text x="130" y="458" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">/decide + /vote 做集體決策</text>
  <rect x="130" y="520" width="350" height="170" rx="24" fill="#FFFFFF"/>
  <text x="160" y="575" fill="#0F2743" font-size="24" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="700">價值</text>
  <text x="160" y="620" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">把混亂聊天變成可視化看板</text>
  <text x="160" y="654" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">讓群組快速收斂出共同版本</text>

  <rect x="585" y="220" width="430" height="560" rx="32" fill="#EEF7FF" stroke="#0077B6" stroke-width="2"/>
  <text x="625" y="285" fill="#0077B6" font-size="20" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="700">情境二</text>
  <text x="625" y="338" fill="#0F2743" font-size="34" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="800">出發前確認準備度</text>
  <text x="625" y="390" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">/ready 看 readiness snapshot</text>
  <text x="625" y="424" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">/booked 補登預訂確認碼</text>
  <text x="625" y="458" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">/ops 確認下一步與風險</text>
  <rect x="625" y="520" width="350" height="170" rx="24" fill="#FFFFFF"/>
  <text x="655" y="575" fill="#0F2743" font-size="24" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="700">價值</text>
  <text x="655" y="620" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">讓「準備好了嗎」變成可量化狀態</text>
  <text x="655" y="654" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">主揪能快速發現阻塞項</text>

  <rect x="1080" y="220" width="430" height="560" rx="32" fill="#FFF6E8" stroke="#F59E0B" stroke-width="2"/>
  <text x="1120" y="285" fill="#F59E0B" font-size="20" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="700">情境三</text>
  <text x="1120" y="338" fill="#0F2743" font-size="34" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="800">旅行中臨時出狀況</text>
  <text x="1120" y="390" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">/incident 啟動 playbook</text>
  <text x="1120" y="424" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">建立 follow-up tasks</text>
  <text x="1120" y="458" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">Ops 畫面同步反映風險</text>
  <rect x="1120" y="520" width="350" height="170" rx="24" fill="#FFFFFF"/>
  <text x="1150" y="575" fill="#0F2743" font-size="24" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="700">價值</text>
  <text x="1150" y="620" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">從單純聊天支援，升級成應變支援</text>
  <text x="1150" y="654" fill="#40617F" font-size="22" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">在高風險時刻仍有結構化下一步</text>
</svg>
